name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          LAUNCHSHIELD_DEMO_PACE_SECONDS: "0.0"
        run: pytest -q --maxfail=1

      - name: Upload run artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: launchshield-data-${{ matrix.os }}-py${{ matrix.python-version }}
          path: data/
          if-no-files-found: ignore
          retention-days: 7

  smoke:
    name: uvicorn smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Launch uvicorn in background
        run: |
          LAUNCHSHIELD_DEMO_PACE_SECONDS=0.0 \
          nohup uvicorn launchshield.app:app --host 127.0.0.1 --port 8000 \
            > uvicorn.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null 2>&1; then
              echo "server up after $i attempts"; exit 0;
            fi
            sleep 1
          done
          echo "server never came up" >&2
          cat uvicorn.log
          exit 1

      - name: Hit health endpoint
        run: curl -fsS http://127.0.0.1:8000/api/health | tee health.json

      - name: Create a preset-stress run
        id: run
        run: |
          RESP=$(curl -fsS -X POST http://127.0.0.1:8000/api/runs \
            -H 'Content-Type: application/json' \
            -d '{"mode":"preset-stress"}')
          echo "$RESP"
          RUN_ID=$(python -c "import json,sys; print(json.loads('''$RESP''')['run_id'])")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Poll the run to completion
        run: |
          for i in {1..60}; do
            STATUS=$(curl -fsS http://127.0.0.1:8000/api/runs/${{ steps.run.outputs.run_id }} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            echo "attempt $i: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              curl -fsS http://127.0.0.1:8000/api/runs/${{ steps.run.outputs.run_id }} > run.json
              python -c "import json; d=json.load(open('run.json')); c=d['counts']; assert c['planned_invocations']==63 and c['completed_invocations']==63 and c['confirmed_payments']==63, c; print('smoke ok:', c)"
              exit 0
            fi
            if [ "$STATUS" = "failed" ]; then
              curl -fsS http://127.0.0.1:8000/api/runs/${{ steps.run.outputs.run_id }}
              exit 1
            fi
            sleep 2
          done
          echo "run never finished" >&2
          exit 1
